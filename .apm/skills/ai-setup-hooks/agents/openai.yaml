interface:
  display_name: "Настройка хуков контроля правил"
  short_description: "Детерминированный контроль правил на событиях"
  default_prompt: "Используй $ai-setup-hooks, чтобы обследовать события и правила проекта и по подтверждению установить хуки, которые детерминированно проверяют артефакт на событии. Не предлагай хук-напоминание вместо проверки и не зашивай конкретные правила или имена навыков в переносимый навык."
