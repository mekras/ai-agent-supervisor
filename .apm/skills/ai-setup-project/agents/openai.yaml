interface:
  display_name: "Настройка проекта под агентов"
  short_description: "Корневая настройка по шагам с подтверждением"
  default_prompt: "Используй $ai-setup-project, чтобы по шагам настроить проект под работу агентов: показывай каждое изменение и его пользу, запрашивай подтверждение по каждому шагу отдельно и делегируй профильным навыкам ai-setup-*, не повторяя их процедуру. Если политика индекса Git ещё не задана, предложи выбрать её и передай выбранное правило в навык сопровождения AGENTS.md. Проверку подагентов запускай по явному запросу, при отсутствии политики и отказа либо после истечения заданного проектом срока."
