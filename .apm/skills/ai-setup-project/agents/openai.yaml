interface:
  display_name: "Настройка проекта под агентов"
  short_description: "Корневая настройка по шагам с подтверждением"
  default_prompt: "Используй $ai-setup-project, чтобы по шагам настроить проект под работу агентов: показывай каждое изменение и его пользу, запрашивай подтверждение по каждому шагу отдельно и делегируй профильным навыкам ai-setup-*, не повторяя их процедуру."
