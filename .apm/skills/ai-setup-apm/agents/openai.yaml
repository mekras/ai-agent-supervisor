interface:
  display_name: "Настройка коллекции APM"
  short_description: "Структурная настройка публикуемого пакета APM: apm.yml, .apm/skills, includes, tests"
  default_prompt: "Используй $ai-setup-apm, чтобы настроить проект как публикуемую коллекцию APM с исходниками в .apm/skills, includes, командой apm run tests и явной структурной приёмкой манифеста, исходников и публикуемого состава. Если проект только потребляет зависимости APM, остановись и верни задачу в клиентскую настройку, а не в producer-пакет."
