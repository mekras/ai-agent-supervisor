interface:
  display_name: "ai-skill-development"
  short_description: "Создание и сопровождение навыков агента"
  default_prompt: "Используй ai-skill-development для создания, проверки или улучшения навыка агента, а также для подключения общих правил к проектным навыкам; для каждого навыка рассмотри вынос повторяемых детерминированных действий в скрипт, проверь тестовое покрытие, добавь недостающие тесты при изменениях и выбирай самый узкий достаточный запуск проверок."
