contract_version: 2

registry:
  path: knowledge/catalog.yml
  format: yaml
  purpose: "Каталог источников переносимого корпуса."

tracked_data:
  root: knowledge/data
  source_pattern: knowledge/data/<source>/source.yml
  item_pattern: knowledge/data/<source>/pages/<item>/item.yml
  statement_pattern: knowledge/data/<source>/pages/<item>/statements.yml
  source_map_pattern: knowledge/data/<source>/source-map.yml

local_data:
  pattern: knowledge/data/<source>/pages/<item>/*.local.*
  policy: "Локальные исходные и нормализованные снимки не отслеживаются Git."

source_ids: [AENG, APMP, ASES, ASKL, AZPF, CODX, GHAB, GIST, INSP, LCMS, LSME, PHSC, PPRX, PRFO, VSCD, XEM7]

derived_documents: [knowledge, skills, README.md, CHANGELOG.md, AGENTS.md]

sensitive_data_policy:
  local_private: knowledge/private.local
  local_raw: knowledge/raw.local
  rules:
    - "Не хранить в Git приватные токены, cookies, ключи доступа и рабочие заметки."
    - "Не переносить в knowledge материалы без источника, даты проверки и явной привязки."

sync:
  default_adapter: manual-web
  unsupported_adapters_policy: manual-required

impact_audit:
  default_scope: [knowledge]
  source_report_required: true
