    text: "Возобновлённый запуск Codex сохраняет исходную стенограмму, историю плана и подтверждения; перед запуском можно изменить рабочий каталог или добавить корни."
    excerpt: |-
      Each resumed run keeps the original transcript, plan history, and approvals, so Codex can use prior context while you supply new instructions. Override the working directory with
      --cd
      or add extra roots with
      --add-dir
      if you need to steer the environment before resuming.
