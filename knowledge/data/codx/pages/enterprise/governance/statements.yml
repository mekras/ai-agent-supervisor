    text: "Для мониторинга Codex Enterprise предусмотрены три уровня: панель аналитики для оперативного контроля, Analytics API для программной отчётности и Compliance API для детальных журналов аудита."
    excerpt: |-
      Ways to track Codex usage
      There are three ways to monitor Codex usage, depending on what you need:
      Analytics Dashboard
      : quick visibility into adoption, usage, and code review impact.
      Analytics API
      : pull structured daily metrics into your data warehouse or BI tools.
      Compliance API
      : exports detailed activity logs for audit, monitoring, and investigations.
