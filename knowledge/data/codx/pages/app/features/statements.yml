    text: "Для каждого диалога приложения Codex можно выбрать режим Local, Worktree или Cloud; режим Worktree изолирует изменения в Git-worktree."
    excerpt: |-
      Each thread runs in a selected mode. When starting a thread, you can choose:
      Local
      : work directly in your current project directory.
      Worktree
      : isolate changes in a Git worktree.
      Learn more
      .
      Cloud
      : run remotely in a configured cloud environment.
