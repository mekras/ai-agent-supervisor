    text: "Песочница определяет технические границы действий Codex, а политика подтверждений — когда агент обязан остановиться перед их пересечением; это разные взаимодополняющие механизмы."
    excerpt: |-
      Sandboxing and approvals are different controls that work together. The
      sandbox defines technical boundaries. The approval policy decides when Codex
      must stop and ask before crossing them.
