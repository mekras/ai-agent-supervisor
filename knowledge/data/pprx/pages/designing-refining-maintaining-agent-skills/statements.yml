    text: "Описание навыка — это триггер маршрутизации, а не внутренняя документация: оно должно сообщать, когда навык загружать."
    excerpt: "The description is the routing trigger. This is a common failure point: the description is not internal documentation for what the Skill does. It amounts to instructions for the model for when to load the Skill."
