name: ai-agent-supervisor
version: 0.4.3
description: Коллекция навыков для контроля применения ИИ в продуктовых задачах
author: mekras
license: MIT
target:
- claude
- codex
type: skill
includes: auto
dependencies:
  apm: []
  mcp: []
scripts:
  tests: sh -c 'set -e; target="${APM_EVAL_PATH:-.apm/skills}"; python3 tools/validate-skill-descriptions.py
    "$target"; python3 tools/validate-trigger-evals.py "$target" --require-all; python3
    tools/validate-skill-result-evals.py "$target"; python3 tools/run-skill-evals.py
    "$target"'
devDependencies:
  apm:
  - mekras/ai-dev-team#^0.3.1
