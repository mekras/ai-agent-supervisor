name: ai-agent-supervisor
version: 2.0.1
description: Коллекция навыков для контроля применения ИИ в продуктовых задачах
author: Михаил Красильников
license: MIT
target:
- claude
- codex
type: skill
includes: auto
dependencies:
  apm: []
  mcp: []
scripts:
  tests: sh -c 'set -e; target="${APM_EVAL_PATH:-.apm/skills}"; python3 .apm/skills/ai-setup-apm/scripts/eval-tools/check-eval-tools-drift.py; python3 tools/test-check-subagent-models.py; python3 tools/test-codex-model-subagent.py; python3 tools/test-run-skill-evals.py; python3 tools/test-product-isolation.py; python3 tools/validate-internal-source-basis.py;
    python3 tools/validate-hidden-unicode.py; python3 tools/validate-product-boundary.py "$target";
    python3 tools/validate-skill-descriptions.py
    "$target"; python3 tools/validate-trigger-evals.py "$target" --require-all;
    python3 tools/validate-skill-result-evals.py "$target"; python3 tools/validate-fixture-evals.py'
  evals: python3 tools/run-skill-evals.py "${APM_EVAL_PATH:-.apm/skills}"
devDependencies:
  apm:
  - mekras/ai-dev-team#^0.20.2
