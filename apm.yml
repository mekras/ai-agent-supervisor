name: ai-agent-supervisor
version: 1.0.0
description: Коллекция навыков для контроля применения ИИ в продуктовых задачах
author: Михаил Красильников
license: MIT
target:
- claude
- codex
type: skill
includes: auto
dependencies:
  apm: []
  mcp: []
scripts:
  tests: sh -c 'set -e; target="${APM_EVAL_PATH:-.apm/skills}"; python3 .apm/skills/ai-setup-apm/scripts/eval-tools/check-eval-tools-drift.py; python3 tools/test-check-subagent-models.py; python3 tools/test-corpus-statements.py;
    python3 tools/validate-hidden-unicode.py; python3 tools/validate-portable-corpus-references.py;
    python3 tools/validate-skill-descriptions.py
    "$target"; python3 tools/validate-trigger-evals.py "$target" --require-all;
    python3 tools/validate-skill-result-evals.py "$target"'
  evals: python3 tools/run-skill-evals.py "${APM_EVAL_PATH:-.apm/skills}"
devDependencies:
  apm:
  - mekras/ai-dev-team#^0.15.0
